# .github/workflows/build.yml
# Tự động build và release khi push tag "v*"
#
# Cách dùng:
#   git tag v2.0.1
#   git push origin v2.0.1
# → GitHub Actions tự build installer và tạo Release

name: Build & Release

on:
  push:
    tags:
      - 'v*'    # trigger khi push tag dạng v1.0.0, v2.1.3, ...

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Python backend → backend.exe ──────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install pyinstaller fastapi uvicorn[standard] websockets pydantic requests

      - name: Build backend with PyInstaller
        run: |
          cd backend
          pyinstaller api.py `
            --name backend `
            --onefile `
            --noconsole `
            --add-data "core;core" `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import pydantic `
            --hidden-import websockets `
            --distpath ..\backend-dist `
            --workpath ..\build-tmp\backend `
            --specpath ..\build-tmp

      # ── Build Electron → installer ───────────────────────────────────────
      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      - name: Build Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # cho phép publish release
        run: |
          cd electron
          npm run build:win

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
