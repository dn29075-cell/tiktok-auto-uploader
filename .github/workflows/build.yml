# .github/workflows/build.yml
# Tu dong build va release khi push tag "v*"
#
# Cach dung:
#   git tag v2.0.1
#   git push origin v2.0.1
# -> GitHub Actions tu build installer va tao Release

name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Python backend -> backend.exe
      - name: Install Python dependencies
        run: |
          pip install pyinstaller fastapi "uvicorn[standard]" websockets pydantic requests

      - name: Build backend with PyInstaller
        run: |
          $backendDir = "${{ github.workspace }}\backend"
          $coreDir    = "$backendDir\core"
          $distDir    = "${{ github.workspace }}\backend-dist"
          $workDir    = "${{ github.workspace }}\build-tmp\backend"
          $specDir    = "${{ github.workspace }}\build-tmp"

          Set-Location $backendDir
          pyinstaller api.py `
            --name backend `
            --onefile `
            --noconsole `
            --add-data "$coreDir;core" `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import pydantic `
            --hidden-import websockets `
            --distpath $distDir `
            --workpath $workDir `
            --specpath $specDir

      # Build Electron -> installer
      - name: Install Electron dependencies
        run: |
          Set-Location "${{ github.workspace }}\electron"
          npm ci

      - name: Build Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ""
        run: |
          Set-Location "${{ github.workspace }}\electron"
          npm run build:win

      # Upload artifacts
      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
